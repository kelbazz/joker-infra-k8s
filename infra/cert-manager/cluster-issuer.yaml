apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # L'URL de l'API de Let's Encrypt
    server: https://acme-v02.api.letsencrypt.org/directory
    # Ton mail pour les alertes d'expiration (au cas où le bot fail, mais on y croit)
    email: its.kelbaz@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: traefik
