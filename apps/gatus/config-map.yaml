apiVersion: v1
kind: ConfigMap
metadata:
  name: gatus-config
  namespace: monitoring
data:
  config.yaml: |
    endpoints:
      - name: "Gitbaz"
        url: "https://git.kelbaz.dev"
        interval: 30s
        conditions:
          - "[STATUS] == 200"
      - name: "AI"
        url: "https://ai.kelbaz.dev"
        interval: 1m
        conditions:
          - "[STATUS] == 200"
